site_name: Mujoco 插件
# 参考链接：https://blog.csdn.net/m0_63203517/article/details/129765689

#repo_url: https://github.com/carla-simulator/carla
#docs_dir: Docs
#edit_uri: 'edit/master/Docs/'


# 设置编译页面的链接的前缀
repo_url: https://github.com/OpenHUTB/mujoco_plugin

# 页面右上角添加直接编辑页面的按钮
edit_uri: edit/master/docs/

theme:
  name: readthedocs
  sticky_navigation: True
  navigation_depth: 3
  features:
    - search.suggest # 在目录栏中的搜索框中输入一些字母时推荐补全整个单词
extra_css: [extra.css]



# mathjax用于单独公式展示
extra_javascript:
  # - extra.js
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/MathJax.js?config=TeX-AMS-MML_HTMLorMML
  - https://cdn.rawgit.com/knsv/mermaid/6.0.0/dist/mermaid.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/raphael/2.2.7/raphael.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.8.3/underscore-min.js
  - https://cdnjs.cloudflare.com/ajax/libs/js-sequence-diagrams/1.0.6/sequence-diagram-min.js
  - https://cdnjs.cloudflare.com/ajax/libs/flowchart/1.6.5/flowchart.min.js
  - js/umlconvert.js

plugins:
#  - mkdocs-video
  - search:
      lang: ja
      separator: '[\s\-\.]+'
      min_search_length: 3

extra:
  generator: false

# plugins:
#   - mkdocs-simple-hooks:
#       hooks:
#         on_pre_build: "docs.hooks:on_config"

# https://github.com/squidfunk/mkdocs-material/discussions/4969
# https://www.mkdocs.org/user-guide/configuration/#hooks
# （已废弃，直接用 hooks 标签）：https://pypi.org/project/mkdocs-simple-hooks/

hooks:
  - hooks.py

copyright: OpenHUTB 版权所有 &copy; {year}

nav:
- 入门: 'getting_started.md'
- 特性: 'features.md'
- MJCF 导入: 'guides/mujoco_import.md'
- 几何体与碰撞: 'guides/geometry_authoring.md'
- 控制器框架: 'guides/controller_framework.md'
- 持有和扭转控制: 'guides/possession_twist.md'
- 使用蓝图编写脚本: 'guides/blueprint_reference.md'
- ZMQ 网络与 ROS 2: 'guides/zmq_networking.md'
- URLab 桥接: 'guides/policy_bridge.md'
- 架构: 'architecture.md'
- 引擎插件开发入门: 'introduction.md'


# - mdx_math 用于行内公式显示
markdown_extensions:
  - admonition
  - mdx_math
  - pymdownx.superfences:
      custom_fences: [
         { name: flow, class: uml-flowchart }
        ,{ name: sequence, class: uml-sequence-diagram }
        ,{ name: mermaid, class: mermaid }
      ]
